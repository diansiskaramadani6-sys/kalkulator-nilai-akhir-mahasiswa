<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator Nilai Mahasiswa</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://picsum.photos/1200/800') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #555;
    }

    .input-group {
      text-align: left;
      margin-top: 15px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #007bff;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Nilai Akhir Mahasiswa</h1>
  <p>Rumus: (Tugas 30%) + (UTS 30%) + (UAS 40%)</p>

  <form method="POST">

    <div class="input-group">
      <label>Nilai Tugas</label>
      <input type="number" name="tugas" placeholder="Contoh: 80" required>
    </div>

    <div class="input-group">
      <label>Nilai UTS</label>
      <input type="number" name="uts" placeholder="Contoh: 75" required>
    </div>

    <div class="input-group">
      <label>Nilai UAS</label>
      <input type="number" name="uas" placeholder="Contoh: 90" required>
    </div>

    <button type="submit">Hitung Nilai</button>

  </form>

  {% if hasil is not none %}
    <div class="result">
      🎓 Nilai Akhir: {{ hasil }}
    </div>
  {% endif %}

  {% if error %}
    <div class="error">
      ⚠️ {{ error }}
    </div>
  {% endif %}

</div>

</body>
</html>
